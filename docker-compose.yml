services:
  qhana-plugin-runner:
    profiles: ["qhana", "all"]
    image: ghcr.io/ust-quantil/qhana-plugin-runner:main
    depends_on:
      - minio
    ports:
      - "5005:8080"
    volumes:
      - instance:/app/instance
    environment:
      WAIT_HOSTS: host.docker.internal:6379, host.docker.internal:5432
      WAIT_SLEEP_INTERVAL: 5
      WAIT_TIMEOUT: 600
      CONCURRENCY: 2
      BROKER_URL: redis://host.docker.internal:6379
      RESULT_BACKEND: redis://host.docker.internal:6379
      CELERY_QUEUE: "qhana_queue1"
      SQLALCHEMY_DATABASE_URI: "postgresql+psycopg2://user:password@host.docker.internal:5432/default_db"
      PLUGIN_REGISTRY_URL: "http://localhost:5006/api/"
      DEFAULT_FILE_STORE: "minio"
      MINIO_CLIENT: '{"endpoint": "localhost:9000", "access_key": "QHANA", "secret_key": "QHANAQHANA", "secure": false}'
      LOCALHOST_PROXY_PORTS: &localhost-proxy-ports ":1977 :5005 :5006 :5007 :5030 :6626 :8000 :8081 :8082 :8083 :8084 :8085 :8098 :9000 :9001 :9091 ${EXTRA_PROXY_PORTS}"
      GIT_PLUGINS: &git-plugins "git+https://github.com/UST-QuAntiL/qhana-plugin-runner.git@main#subdirectory=/stable_plugins\ngit+https://github.com/UST-QuAntiL/qhana-plugin-runner.git@feature/music-feature-extractor#subdirectory=/stable_plugins/classical_ml/data_preparation/music_feature_extractor\ngit+https://github.com/UST-QuAntiL/qhana-plugin-runner.git@main#subdirectory=/plugins/sql_loader"
      PLUGIN_FOLDERS: &plugin-folders ./git-plugins:./git-plugins/classical_ml/data_preparation:./git-plugins/classical_ml/scikit_ml:./git-plugins/data_synthesis:./git-plugins/demo:./git-plugins/file_utils:./git-plugins/infrastructure:./git-plugins/muse:./git-plugins/quantum_ml/max_cut:./git-plugins/quantum_ml/pennylane_qiskit_ml:./git-plugins/quantum_ml/qiskit_ml:./git-plugins/visualization/complex:./git-plugins/visualization/file_types:./git-plugins/music_feature_extractor:./git-plugins/sql_loader
      SERVICE_DATA_CONFIG: "http://localhost:6789" # ensure this is an unused port
      LCM_QunicornEndpoint: "http://localhost:8081"
      LCM_PatternAtlasApiEndpoint: "http://localhost:1977/patternatlas/patternLanguages/af7780d5-1f97-4536-8da7-4194b093ab1d"
      NISQ_ANALYZER_UI_URL: "http://localhost:5009"
    extra_hosts:
      - "host.docker.internal:host-gateway"
  redis:
    profiles: ["qhana", "qunicorn", "all"]
    image: "redis:latest"
    ports:
      - "6379:6379"
  postgres:
    profiles: ["qhana", "all"]
    image: "postgres:latest"
    ports:
      - "5432:5432"
    environment:
      POSTGRES_PASSWORD: password
      POSTGRES_USER: user
      POSTGRES_DB: default_db
  postgres-registry:
    profiles: ["qhana", "all"]
    image: "postgres:latest"
    ports:
      - "5433:5432"
    environment:
      POSTGRES_PASSWORD: password
      POSTGRES_USER: user
      POSTGRES_DB: default_db
  minio:
    profiles: ["qhana", "all"]
    image: quay.io/minio/minio
    command: server /data --console-address ":9001"
    volumes:
      - minio:/data
    environment:
      MINIO_ROOT_USER: QHANA
      MINIO_ROOT_PASSWORD: QHANAQHANA
    ports:
      - "9000:9000"
      - "9001:9001"
  muse-db:
    profiles: ["qhana", "all"]
    image: ghcr.io/ust-quantil/mini-muse:main
  worker:
    profiles: ["qhana", "all"]
    image: ghcr.io/ust-quantil/qhana-plugin-runner:main
    depends_on:
      - qhana-plugin-runner
    volumes:
      - instance:/app/instance
    environment:
      WAIT_HOSTS: host.docker.internal:6379, host.docker.internal:5432
      WAIT_SLEEP_INTERVAL: 5
      WAIT_TIMEOUT: 600
      CONTAINER_MODE: worker
      CONCURRENCY: 2
      PERIODIC_SCHEDULER: true
      BROKER_URL: redis://host.docker.internal:6379
      RESULT_BACKEND: redis://host.docker.internal:6379
      CELERY_QUEUE: "qhana_queue1"
      SQLALCHEMY_DATABASE_URI: "postgresql+psycopg2://user:password@host.docker.internal:5432/default_db"
      PLUGIN_REGISTRY_URL: "http://localhost:5006/api/"
      DEFAULT_FILE_STORE: "minio"
      MINIO_CLIENT: '{"endpoint": "localhost:9000", "access_key": "QHANA", "secret_key": "QHANAQHANA", "secure": false}'
      LOCALHOST_PROXY_PORTS: *localhost-proxy-ports
      GIT_PLUGINS: *git-plugins
      PLUGIN_FOLDERS: *plugin-folders
      SERVICE_DATA_CONFIG: "http://localhost:6789" # ensure this is an unused port
      LCM_QunicornEndpoint: "http://localhost:8081"
      LCM_PatternAtlasApiEndpoint: "http://localhost:1977/patternatlas/patternLanguages/af7780d5-1f97-4536-8da7-4194b093ab1d"
      NISQ_ANALYZER_UI_URL: "http://localhost:5009"
    extra_hosts:
      - "host.docker.internal:host-gateway"
  backend:
    profiles: ["qhana", "all"]
    image: ghcr.io/ust-quantil/qhana-backend:main
    volumes:
      - experiments:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      LOCALHOST_PROXY_PORTS: *localhost-proxy-ports
      QHANA_HOST: http://localhost:9091
    ports:
      - 9091:9090
  ui:
    profiles: ["qhana", "all"]
    image: ghcr.io/ust-quantil/qhana-ui:main
    ports:
      - 8080:8080
    environment:
      PLUGIN_REGISTRY_PROTOCOL: "http:"
      PLUGIN_REGISTRY_HOSTNAME: localhost
      PLUGIN_REGISTRY_PORT: 5006
      PLUGIN_REGISTRY_PATH: /api/
    extra_hosts:
      - "host.docker.internal:host-gateway"
  registry:
    profiles: ["qhana", "all"]
    image: ghcr.io/ust-quantil/qhana-plugin-registry:main
    ports:
      - "5006:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      WAIT_HOSTS: host.docker.internal:6379, host.docker.internal:5433
      WAIT_SLEEP_INTERVAL: 5
      WAIT_AFTER: 5
      WAIT_TIMEOUT: 600
      BROKER_URL: redis://host.docker.internal:6379
      RESULT_BACKEND: redis://host.docker.internal:6379
      CELERY_QUEUE: "registry_queue"
      SQLALCHEMY_DATABASE_URI: "postgresql+psycopg2://user:password@host.docker.internal:5433/default_db"
      LOCALHOST_PROXY_PORTS: *localhost-proxy-ports
      INITIAL_PLUGIN_SEEDS: "http://localhost:5005"
      PRECONFIGURED_SERVICES: '[
          {"serviceId": "qhana-backend", "name": "Backend", "url": "http://localhost:9091"},
          {"serviceId": "latex-renderer", "name": "LaTeX Renderer", "url": "http://localhost:5030"},
          {"serviceId": "qunicorn", "name": "Qunicorn", "url": "http://localhost:8081"},
          {"serviceId": "low-code-backend", "name": "Low-Code Backend", "url": "http://localhost:8000"},
          {"serviceId": "pattern-atlas", "name": "Pattern Atlas", "url": "http://localhost:1977"}
        ]'
  registry-worker:
    profiles: ["qhana", "all"]
    image: ghcr.io/ust-quantil/qhana-plugin-registry:main
    ports:
      - "5007:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      WAIT_HOSTS: host.docker.internal:6379, host.docker.internal:5433
      WAIT_SLEEP_INTERVAL: 5
      WAIT_AFTER: 5
      WAIT_TIMEOUT: 600
      CONTAINER_MODE: worker
      BROKER_URL: redis://host.docker.internal:6379
      RESULT_BACKEND: redis://host.docker.internal:6379
      CELERY_QUEUE: "registry_queue"
      SQLALCHEMY_DATABASE_URI: "postgresql+psycopg2://user:password@host.docker.internal:5433/default_db"
      LOCALHOST_PROXY_PORTS: *localhost-proxy-ports
      PLUGIN_DISCOVERY_INTERVAL: 60
      PERIODIC_SCHEDULER: true


volumes:
  minio:
  instance:
  experiments:
networks:
  default:
    driver: bridge
